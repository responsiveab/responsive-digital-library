services:
    server:
        build:
            context: ./server
            dockerfile: Dockerfile
        image: responsive-library-server
        container_name: responsive-library-node-server
        command: npm run dev
        volumes:
            - ./server/:/usr/src/app
            - /usr/src/app/node_modules
        ports:
            - "127.0.0.1:8080:8080"
            # Uncomment the following line and replace the previous line if you want to access the container from outside localhost
            # - "8080:8080"
        depends_on:
            - mongo
        environment:
            - NODE_ENV=production
            - MONGO_HOSTNAME=mongo
            - MONGO_DB=responsive_library_db
            - MONGO_PORT=27017
            - BUILD_PORT=8080
            - TOKEN_KEY=${TOKEN_KEY:?TOKEN_KEY is required - copy .env.example to .env and fill in}
        networks:
            - responsive-library-network
    mongo:
        image: mongo:7.0
        volumes:
            - data-volume:/data/db
        ports:
            - "127.0.0.1:27017:27017"
            # Uncomment the following line and replace the previous line if you want to access the container from outside localhost
            # - "27017:27017"
        networks:
            - responsive-library-network
    client:
        build:
            context: ./client
            dockerfile: Dockerfile
        image: responsive-library-client
        container_name: responsive-library-react-client
        command: sh -c "npm install && npm run start"
        volumes:
            - ./client/:/usr/app
            - /usr/app/node_modules
        depends_on:
            - server
        env_file: ./client/.env
        ports:
            - "127.0.0.1:3000:3000"
            # Uncomment the following line and replace the previous line if you want to access the container from outside localhost
            # - "3000:3000"
        networks:
            - responsive-library-network

networks:
    responsive-library-network:
        driver: bridge

volumes:
    data-volume:
    node_modules:
    web-root:
        driver: local
