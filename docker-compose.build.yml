services:
  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    image: responsive-digital-library:local-build
    ports:
      - "8082:8080"
    environment:
      NODE_ENV: production
      MONGO_HOSTNAME: mongo
      MONGO_DB: responsive_library_db
      MONGO_PORT: 27017
      BUILD_PORT: 8080
      TOKEN_KEY: ${TOKEN_KEY:?TOKEN_KEY is required - copy .env.example to .env and fill in}
    depends_on:
      - mongo
    networks:
      - responsive-library-network
  mongo:
    restart: unless-stopped
    image: mongo:7.0
    volumes:
      - build-data-volume:/data/db
    networks:
      - responsive-library-network

networks:
  responsive-library-network:
    driver: bridge

volumes:
  build-data-volume:
